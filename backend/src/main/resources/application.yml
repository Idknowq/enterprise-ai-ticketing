server:
  port: ${APP_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: enterprise-ai-ticketing
  profiles:
    default: dev
  datasource:
    url: jdbc:postgresql://${APP_DB_HOST:localhost}:${APP_DB_PORT:5432}/${APP_DB_NAME:ticketing}
    username: ${APP_DB_USERNAME:ticketing}
    password: ${APP_DB_PASSWORD:ticketing}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: ${APP_REDIS_HOST:localhost}
      port: ${APP_REDIS_PORT:6379}
  rabbitmq:
    host: ${APP_RABBITMQ_HOST:localhost}
    port: ${APP_RABBITMQ_PORT:5672}
    username: ${APP_RABBITMQ_USERNAME:guest}
    password: ${APP_RABBITMQ_PASSWORD:guest}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true
  jackson:
    time-zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,configprops
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${APP_OTEL_EXPORTER_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    com.enterprise.ticketing: INFO

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    operations-sorter: method
    tags-sorter: alpha

app:
  api-base-path: /api
  qdrant:
    host: ${APP_QDRANT_HOST:localhost}
    http-port: ${APP_QDRANT_HTTP_PORT:6333}
    grpc-port: ${APP_QDRANT_GRPC_PORT:6334}
    api-key: ${APP_QDRANT_API_KEY:}
  temporal:
    host: ${APP_TEMPORAL_HOST:localhost}
    port: ${APP_TEMPORAL_PORT:7233}
    namespace: ${APP_TEMPORAL_NAMESPACE:default}
    task-queue: ticketing-mvp-task-queue
  observability:
    service-name: enterprise-ai-ticketing
    trace-enabled: true
    metrics-enabled: true
    log-correlation-enabled: true
  modules:
    auth: true
    ticket: true
    knowledge: true
    ai: true
    workflow: true
    approval: true
    observability: true
